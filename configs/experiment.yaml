      hidden_dim: 64
      num_layers: 2
      dropout: 0.1
      batch_size: 64
      max_epochs: 40
      early_stopping_patience: 8
      learning_rate: 0.001
      weight_decay: 0.0
      random_state: 42
  tcn:
    classification:
      timesteps: 12
      channels:
      - 32
      - 32
      - 32
      kernel_size: 3
      dropout: 0.1
      batch_size: 64
      max_epochs: 40
      early_stopping_patience: 8
      learning_rate: 0.001
      weight_decay: 0.0
      random_state: 42
