experiment_name: onchain_crypto_graduation_research
artifact_prefix: btc_predict
symbol: BTC-USD
label_horizon_days: 1
feature_set: all
random_seed: 42
research:
  objective: Compare direction vs magnitude prediction across ML/DL with on-chain-centric
    data.
  paper_guided_not_exact_reproduction: true
  prioritize_data_coverage_and_quality: true
pipeline:
  run_data_download: true
  run_feature_build: true
  run_feature_selection: true
  run_training: true
  run_backtest: true
  run_reporting: true
features:
  price_factors: true
  onchain_factors: true
  macro_factors: false
  ta_factors: true
preprocessing:
  handle_missing: drop_rows_with_missing_after_merge
  standardize_after_split: true
  preserve_temporal_order: true
  no_shuffle: true
  scaling:
    method: zscore
    fit_on_train_only: true
tasks:
  classification:
    enabled: true
    label_col: direction_h
    positive_class_rule: log_ret_h>0
    metrics:
    - accuracy
    - precision
    - recall
    - f1
  regression:
    enabled: true
    label_col: log_ret_h
    metrics:
    - rmse
    - r2
    - mae
    - directional_accuracy
datasets:
  variants:
  - onchain
  - ta
  - all
  - boruta_onchain
  - boruta_ta
  - boruta_all
  - univariate
  univariate_price_col: close
  boruta:
    enabled: true
    estimator: random_forest
    n_estimators: 1000
    max_iter: 100
    perc: 100
    alpha: 0.05
    random_state: 42
  feature_selection:
    method: boruta_lasso
    lasso:
      alpha: 0.001
      C: 0.5
      solver: liblinear
      class_weight: balanced
      max_iter: 2000
      tol: 0.0001
      coef_threshold: 1.0e-08
      random_state: 42
models:
  ridge:
    regression:
      alpha: 1.0
      fit_intercept: true
      normalize_features: true
  lasso:
    regression:
      alpha: 0.001
      max_iter: 5000
      tol: 0.0001
      normalize_features: true
      random_state: 42
  svm:
    classification:
      C: 10.0
      kernel: rbf
      gamma: scale
      class_weight: balanced
      probability: true
      normalize_features: true
      random_state: 42
    regression:
      C: 10.0
      kernel: rbf
      gamma: scale
      epsilon: 0.01
      normalize_features: true
      random_state: 42
  rf:
    classification:
      n_estimators: 800
      max_depth: 12
      min_samples_split: 4
      min_samples_leaf: 2
      max_features: sqrt
      class_weight: balanced
      random_state: 42
      n_jobs: -1
    regression:
      n_estimators: 800
      max_depth: 12
      min_samples_split: 4
      min_samples_leaf: 2
      max_features: sqrt
      random_state: 42
      n_jobs: -1
  lgbm:
    classification:
      n_estimators: 800
      learning_rate: 0.02
      max_depth: 6
      num_leaves: 63
      min_child_samples: 25
      subsample: 0.8
      colsample_bytree: 0.8
      reg_alpha: 0.05
      reg_lambda: 1.0
      random_state: 42
      n_jobs: -1
    regression:
      n_estimators: 900
      learning_rate: 0.02
      max_depth: 6
      num_leaves: 63
      min_child_samples: 20
      subsample: 0.8
      colsample_bytree: 0.7
      reg_alpha: 0.1
      reg_lambda: 1.0
      random_state: 42
      n_jobs: -1
  xgboost:
    classification:
      n_estimators: 800
      learning_rate: 0.03
      max_depth: 6
      subsample: 0.8
      colsample_bytree: 0.8
      reg_alpha: 0.05
      reg_lambda: 1.0
      random_state: 42
      n_jobs: -1
    regression:
      n_estimators: 900
      learning_rate: 0.03
      max_depth: 6
      subsample: 0.8
      colsample_bytree: 0.7
      reg_alpha: 0.1
      reg_lambda: 1.0
      random_state: 42
      n_jobs: -1
  lstm:
    classification:
      timesteps: 10
      hidden_dim: 64
      num_layers: 2
      dropout: 0.1
      batch_size: 64
      max_epochs: 40
      early_stopping_patience: 8
      learning_rate: 0.001
      weight_decay: 0.0
      random_state: 42
    regression:
      timesteps: 10
      hidden_dim: 64
      num_layers: 2
      dropout: 0.1
      batch_size: 64
      max_epochs: 40
      early_stopping_patience: 8
      learning_rate: 0.001
      weight_decay: 0.0
      random_state: 42
